
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ==================== 默认深色模式变量 ==================== */
:root {
  --bg-primary: #050508;
  --bg-secondary: #0a0a0f;
  --bg-card: #111118;
  --bg-hover: #1a1a25;
  --text-primary: #ffffff;
  --text-secondary: #8892b0;
  --text-muted: #495670;
  --accent-cyan: #00f0ff;
  --accent-purple: #bd34fe;
  --accent-pink: #ff006e;
  --accent-green: #00ff88;
  --border: rgba(0, 240, 255, 0.1);
  --border-hover: rgba(0, 240, 255, 0.5);
  --glow-cyan: 0 0 20px rgba(0, 240, 255, 0.4);
  --glow-purple: 0 0 30px rgba(189, 52, 254, 0.3);
}

/* ==================== 浅色模式覆盖 ==================== */
html[data-theme="light"] {
  --bg-primary: #f8f9fa;
  --bg-secondary: #e9ecef;
  --bg-card: #ffffff;
  --bg-hover: #f1f3f5;
  --text-primary: #212529;
  --text-secondary: #495057;
  --text-muted: #868e96;
  --accent-cyan: #0066cc;
  --accent-purple: #7c3aed;
  --accent-pink: #ec4899;
  --accent-green: #059669;
  --border: rgba(0, 0, 0, 0.08);
  --border-hover: rgba(0, 102, 204, 0.3);
  --glow-cyan: 0 0 20px rgba(0, 102, 204, 0.2);
  --glow-purple: 0 0 30px rgba(124, 58, 237, 0.2);
}

/* 系统浅色模式媒体查询（首次访问时） */
@media (prefers-color-scheme: light) {
  :root:not([data-theme]) {
    --bg-primary: #f8f9fa;
    --bg-secondary: #e9ecef;
    --bg-card: #ffffff;
    --bg-hover: #f1f3f5;
    --text-primary: #212529;
    --text-secondary: #495057;
    --text-muted: #868e96;
    --accent-cyan: #0066cc;
    --accent-purple: #7c3aed;
    --accent-pink: #ec4899;
    --accent-green: #059669;
    --border: rgba(0, 0, 0, 0.08);
    --border-hover: rgba(0, 102, 204, 0.3);
    --glow-cyan: 0 0 20px rgba(0, 102, 204, 0.2);
    --glow-purple: 0 0 30px rgba(124, 58, 237, 0.2);
  }
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
  transition: background 0.3s ease, color 0.3s ease;
}

/* ==================== 动态粒子背景 ==================== */
#particles-canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
}

/* ==================== 容器 ==================== */
.container {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 40px 24px;
  max-width: 1000px;
  margin: 0 auto;
  width: 100%;
}

/* ==================== 顶部控制栏 ==================== */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 60px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

/* 主题切换按钮 */
.theme-toggle {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 20px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 30px;
  color: var(--text-secondary);
  font-size: 14px;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.theme-toggle::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.1), transparent);
  transition: left 0.5s;
}

.theme-toggle:hover::before {
  left: 100%;
}

.theme-toggle:hover {
  border-color: var(--accent-cyan);
  color: var(--accent-cyan);
  box-shadow: var(--glow-cyan);
}

.theme-toggle svg {
  width: 18px;
  height: 18px;
  stroke: currentColor;
  stroke-width: 2;
  fill: none;
}

/* ==================== 头部 ==================== */
.header {
  margin-bottom: 60px;
  position: relative;
}

/* 打字机效果容器 - 字体放大 */
.typewriter-container {
  font-family: 'JetBrains Mono', 'Fira Code', monospace;
  font-size: 18px;
  color: var(--accent-green);
  margin-bottom: 24px;
  min-height: 28px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.typewriter-prefix {
  color: var(--accent-purple);
  font-weight: 700;
}

.typewriter-text {
  position: relative;
  font-weight: 600;
}

.typewriter-cursor {
  display: inline-block;
  width: 3px;
  height: 22px;
  background: var(--accent-green);
  animation: blink 1s infinite;
  margin-left: 2px;
  vertical-align: middle;
}

@keyframes blink {
  0%, 50% { opacity: 1; }
  51%, 100% { opacity: 0; }
}

h1 {
  font-size: 52px;
  font-weight: 800;
  margin-bottom: 16px;
  letter-spacing: -2px;
  background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-cyan) 50%, var(--accent-purple) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  position: relative;
  display: inline-block;
}

h1::after {
  content: '';
  position: absolute;
  bottom: -10px;
  left: 0;
  width: 100px;
  height: 4px;
  background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
  border-radius: 2px;
}

.subtitle {
  font-size: 20px;
  color: var(--text-secondary);
  max-width: 600px;
  line-height: 1.7;
  margin-top: 24px;
}

/* ==================== 主内容网格 ==================== */
.main-grid {
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 40px;
  margin-bottom: 60px;
  align-items: start;
}

/* 左侧：二维码大卡片 */
.qr-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 40px;
  position: relative;
  overflow: hidden;
  order: 1;
  transition: all 0.3s ease;
}

.qr-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple), var(--accent-pink));
  animation: border-flow 3s linear infinite;
  background-size: 200% 100%;
}

@keyframes border-flow {
  0% { background-position: 0% 50%; }
  100% { background-position: 200% 50%; }
}

.qr-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 32px;
}

.qr-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 10px;
}

.qr-title svg {
  width: 24px;
  height: 24px;
  stroke: var(--accent-cyan);
  stroke-width: 2;
  fill: none;
}

.qr-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--accent-green);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.status-dot {
  width: 8px;
  height: 8px;
  background: var(--accent-green);
  border-radius: 50%;
  box-shadow: 0 0 10px var(--accent-green);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(1.2); }
}

/* 二维码图片容器 */
.qr-wrapper {
  position: relative;
  cursor: pointer;
  border-radius: 16px;
  overflow: hidden;
  transition: transform 0.3s ease;
}

.qr-wrapper:hover {
  transform: translateY(-4px);
}

.qr-wrapper::after {
  content: '点击放大';
  position: absolute;
  bottom: 16px;
  right: 16px;
  padding: 8px 16px;
  background: rgba(0, 0, 0, 0.8);
  border: 1px solid var(--accent-cyan);
  border-radius: 20px;
  font-size: 12px;
  color: var(--accent-cyan);
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.3s ease;
}

.qr-wrapper:hover::after {
  opacity: 1;
  transform: translateY(0);
}

.qr-image {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 16px;
  border: 1px solid var(--border);
  transition: all 0.3s ease;
}

.qr-wrapper:hover .qr-image {
  border-color: var(--accent-cyan);
  box-shadow: var(--glow-cyan);
}

/* 右侧：信息面板 - 无动画 */
.info-panel {
  display: flex;
  flex-direction: column;
  gap: 20px;
  order: 2;
}

.info-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  position: relative;
  overflow: hidden;
  transition: all 0.3s ease;
}

/* 移除所有 hover 动画 */
.info-card::before {
  display: none;
}

.info-card:hover {
  border-color: var(--border);
  transform: none;
  background: var(--bg-card);
}

.info-card h3 {
  font-size: 16px;
  font-weight: 700;
  color: var(--accent-cyan);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.info-card h3 svg {
  width: 20px;
  height: 20px;
  stroke: currentColor;
  stroke-width: 2;
  fill: none;
}

.info-card p {
  font-size: 15px;
  color: var(--text-secondary);
  line-height: 1.7;
}

/* 统计网格 - 加粗字体 */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-top: 8px;
}

.stat-box {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  position: relative;
  overflow: hidden;
  transition: all 0.3s ease;
}

/* 移除 hover 动画 */
.stat-box:hover {
  border-color: var(--border);
  transform: none;
  box-shadow: none;
}

/* 统计数字容器 - 横向排列 */
.stat-number {
  display: flex;
  align-items: baseline;
  justify-content: center;
  gap: 2px;
  font-family: 'JetBrains Mono', monospace;
  margin-bottom: 8px;
}

/* 数字部分 - 单位和数字一样大 */
.stat-number .num {
  font-size: 36px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -1px;
  line-height: 1;
}

/* 单位部分 - 和数字完全一样大 */
.stat-number .unit {
  font-size: 36px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -1px;
  line-height: 1;
}

.stat-label {
  font-size: 13px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 700;
}

/* ==================== 底部区域 ==================== */
.footer-section {
  margin-top: auto;
  padding-top: 40px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 20px;
}

.footer-left {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.copyright {
  font-size: 14px;
  color: var(--text-muted);
  font-family: 'JetBrains Mono', monospace;
}

.footer-links {
  display: flex;
  gap: 24px;
}

.footer-links a {
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  position: relative;
  padding: 4px 0;
  transition: color 0.3s;
}

.footer-links a::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
  transition: width 0.3s ease;
}

.footer-links a:hover {
  color: var(--accent-cyan);
}

.footer-links a:hover::after {
  width: 100%;
}

/* ==================== 图片放大模态框 ==================== */
.image-modal {
  display: none;
  position: fixed;
  z-index: 1000;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(5, 5, 8, 0.95);
  backdrop-filter: blur(10px);
  opacity: 0;
  transition: opacity 0.3s ease;
}

.image-modal.active {
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 1;
}

.modal-content {
  position: relative;
  max-width: 90%;
  max-height: 90%;
  transform: scale(0.5);
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.image-modal.active .modal-content {
  transform: scale(1);
}

/* 模态框图片容器 */
.modal-image-container {
  max-width: 100%;
  max-height: 85vh;
  border-radius: 20px;
  border: 2px solid var(--accent-cyan);
  box-shadow: 0 0 60px rgba(0, 240, 255, 0.3);
  overflow: hidden;
  background: var(--bg-card);
}

.modal-image {
  max-width: 100%;
  max-height: 85vh;
  display: block;
}

.modal-close {
  position: absolute;
  top: -50px;
  right: 0;
  width: 40px;
  height: 40px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text-secondary);
  font-size: 24px;
  transition: all 0.3s ease;
}

.modal-close:hover {
  border-color: var(--accent-pink);
  color: var(--accent-pink);
  transform: rotate(90deg);
}

.modal-hint {
  position: absolute;
  bottom: -40px;
  left: 50%;
  transform: translateX(-50%);
  color: var(--text-muted);
  font-size: 14px;
  white-space: nowrap;
}

/* ==================== 响应式：手机版布局调整 ==================== */
@media (max-width: 768px) {
  .container {
    padding: 24px 20px;
  }
  
  /* 打字机字体稍微缩小但仍保持可读性 */
  .typewriter-container {
    font-size: 16px;
    min-height: 24px;
  }
  
  .typewriter-cursor {
    height: 20px;
  }
  
  h1 {
    font-size: 32px;
  }
  
  .subtitle {
    font-size: 16px;
  }
  
  /* 主网格改为垂直布局，信息面板在上 */
  .main-grid {
    grid-template-columns: 1fr;
    gap: 24px;
  }
  
  /* 调整顺序：信息面板在上 (order: 1)，赞赏码在下 (order: 2) */
  .info-panel {
    order: 1;
  }
  
  .qr-card {
    order: 2;
    padding: 24px;
  }
  
  /* 统计网格保持双列 */
  .stats-grid {
    grid-template-columns: 1fr 1fr;
  }
  
  /* 单位和数字一样大 */
  .stat-number .num,
  .stat-number .unit {
    font-size: 32px;
  }
  
  .footer-section {
    flex-direction: column;
    text-align: center;
    gap: 16px;
  }
  
  .footer-links {
    gap: 16px;
  }
}

/* 小屏幕优化 */
@media (max-width: 380px) {
  .typewriter-container {
    font-size: 14px;
  }
  
  .nav-btn span {
    display: none;
  }
  .nav-btn {
    padding: 12px;
  }
  
  /* 单位和数字一样大 */
  .stat-number .num,
  .stat-number .unit {
    font-size: 28px;
  }
  
  .stat-label {
    font-size: 11px;
  }
}

/* 滚动条美化 */
::-webkit-scrollbar {
  width: 8px;
}

::-webkit-scrollbar-track {
  background: var(--bg-primary);
}

::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
  background: var(--accent-cyan);
}
</style>

<script>
(function() {
  'use strict';
  
  // ==================== 动态年份 ====================
  function updateYear() {
    const year = new Date().getFullYear();
    document.getElementById('currentYear').textContent = year;
  }
  updateYear();
  
  // ==================== 打字机效果 ====================
  const codeSnippets = [
    'sudo apt-get install coffee',
    'brew install motivation',
    'npm run dev --sponsor=true',
    'git commit -m "add supporter"',
    'echo "Thanks for your support!"',
    'curl -X POST https://leonardofox346.dev/donate',
    'systemctl restart creativity.service'
  ];
  
  let snippetIndex = 0;
  let charIndex = 0;
  let isDeleting = false;
  let typeSpeed = 100;
  
  function typeWriter() {
    const currentText = codeSnippets[snippetIndex];
    const typewriterElement = document.getElementById('typewriter');
    
    if (isDeleting) {
      typewriterElement.textContent = currentText.substring(0, charIndex - 1);
      charIndex--;
      typeSpeed = 50;
    } else {
      typewriterElement.textContent = currentText.substring(0, charIndex + 1);
      charIndex++;
      typeSpeed = 100 + Math.random() * 50;
    }
    
    if (!isDeleting && charIndex === currentText.length) {
      isDeleting = true;
      typeSpeed = 2000;
    } else if (isDeleting && charIndex === 0) {
      isDeleting = false;
      snippetIndex = (snippetIndex + 1) % codeSnippets.length;
      typeSpeed = 500;
    }
    
    setTimeout(typeWriter, typeSpeed);
  }
  
  setTimeout(typeWriter, 1000);
  
  // ==================== 数字滚动动画 ====================
  function animateNumbers() {
    const numbers = document.querySelectorAll('.stat-number .num');
    
    numbers.forEach(num => {
      const target = parseFloat(num.getAttribute('data-target'));
      const isFloat = target % 1 !== 0;
      const duration = 2000;
      const step = target / (duration / 16);
      let current = 0;
      
      const updateNumber = () => {
        current += step;
        if (current < target) {
          num.textContent = isFloat ? current.toFixed(1) : Math.floor(current);
          requestAnimationFrame(updateNumber);
        } else {
          num.textContent = isFloat ? target.toFixed(1) : target;
        }
      };
      
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            updateNumber();
            observer.unobserve(entry.target);
          }
        });
      });
      
      observer.observe(num);
    });
  }
  animateNumbers();
  
  // ==================== 粒子背景 ====================
  function initParticles() {
    const canvas = document.getElementById('particles-canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let particles = [];
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    
    class Particle {
      constructor() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = (Math.random() - 0.5) * 0.5;
        this.size = Math.random() * 2;
        this.opacity = Math.random() * 0.5 + 0.1;
      }
      
      update() {
        this.x += this.vx;
        this.y += this.vy;
        
        if (this.x < 0 || this.x > width) this.vx *= -1;
        if (this.y < 0 || this.y > height) this.vy *= -1;
      }
      
      draw() {
        ctx.fillStyle = `rgba(0, 240, 255, ${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    
    function init() {
      particles = [];
      for (let i = 0; i < 50; i++) {
        particles.push(new Particle());
      }
    }
    
    function animate() {
      ctx.clearRect(0, 0, width, height);
      
      particles.forEach((p, index) => {
        p.update();
        p.draw();
        
        for (let j = index + 1; j < particles.length; j++) {
          const p2 = particles[j];
          const dx = p.x - p2.x;
          const dy = p.y - p2.y;
          const distance = Math.sqrt(dx * dx + dy * dy);
          
          if (distance < 150) {
            ctx.strokeStyle = `rgba(0, 240, 255, ${0.1 * (1 - distance / 150)})`;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.stroke();
          }
        }
      });
      
      requestAnimationFrame(animate);
    }
    
    window.addEventListener('resize', resize);
    resize();
    init();
    animate();
  }
  initParticles();
  
  // ==================== 图片放大模态框 ====================
  const QR_CODE_URL = 'https://pic1.imgdb.cn/item/687871fe58cb8da5c8bcd393.png';
  
  window.openModal = function() {
    const modal = document.getElementById('imageModal');
    const container = document.getElementById('modalImageContainer');
    
    container.innerHTML = '';
    
    const img = new Image();
    img.src = QR_CODE_URL;
    img.alt = '微信赞赏码';
    img.className = 'modal-image';
    img.style.display = 'block';
    
    img.onload = function() {
      container.appendChild(img);
      modal.classList.add('active');
      document.body.style.overflow = 'hidden';
    };
    
    if (img.complete) {
      container.appendChild(img);
      modal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }
  };
  
  window.closeModal = function() {
    const modal = document.getElementById('imageModal');
    const container = document.getElementById('modalImageContainer');
    
    modal.classList.remove('active');
    document.body.style.overflow = '';
    
    setTimeout(() => {
      container.innerHTML = '';
    }, 300);
  };
  
  document.getElementById('imageModal').addEventListener('click', function(e) {
    if (e.target === this) {
      closeModal();
    }
  });
  
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      closeModal();
    }
  });
  
  // ==================== 主题切换功能（检测浏览器偏好） ====================
  let isDarkMode = true;
  
  // 检测系统主题偏好
  function getSystemTheme() {
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
      return 'light';
    }
    return 'dark';
  }
  
  // 初始化主题
  function initTheme() {
    const html = document.documentElement;
    const savedTheme = localStorage.getItem('theme');
    
    // 如果有保存的设置，使用保存的
    // 否则检测浏览器偏好
    let theme;
    if (savedTheme) {
      theme = savedTheme;
    } else {
      theme = getSystemTheme();
    }
    
    // 应用主题
    if (theme === 'light') {
      isDarkMode = false;
      html.setAttribute('data-theme', 'light');
    } else {
      isDarkMode = true;
      html.setAttribute('data-theme', 'dark');
    }
    
    updateThemeUI();
    
    // 监听系统主题变化（仅在用户未手动设置时）
    if (window.matchMedia) {
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
        // 如果用户已手动设置，不跟随系统
        if (localStorage.getItem('theme')) return;
        
        if (e.matches) {
          isDarkMode = true;
          html.setAttribute('data-theme', 'dark');
        } else {
          isDarkMode = false;
          html.setAttribute('data-theme', 'light');
        }
        updateThemeUI();
      });
    }
  }
  
  // 更新主题图标
  function updateThemeUI() {
    const sunIcon = document.getElementById('sunIcon');
    const moonIcon = document.getElementById('moonIcon');
    const themeText = document.getElementById('themeText');
    
    if (isDarkMode) {
      // 当前深色，显示太阳，点击切换到浅色
      sunIcon.style.display = 'block';
      moonIcon.style.display = 'none';
      themeText.textContent = '切换浅色';
    } else {
      // 当前浅色，显示月亮，点击切换到深色
      sunIcon.style.display = 'none';
      moonIcon.style.display = 'block';
      themeText.textContent = '切换深色';
    }
  }
  
  // 切换主题
  window.toggleTheme = function() {
    const html = document.documentElement;
    
    isDarkMode = !isDarkMode;
    
    if (isDarkMode) {
      html.setAttribute('data-theme', 'dark');
      localStorage.setItem('theme', 'dark');
    } else {
      html.setAttribute('data-theme', 'light');
      localStorage.setItem('theme', 'light');
    }
    
    updateThemeUI();
  };
  
  // 初始化
  initTheme();
  
})();
</script>
